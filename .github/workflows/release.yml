name: Build & Release

on:
  push:
    branches:
      - main

jobs:
  build-android:
    name: Android APK
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.41.5'
          channel: stable

      - name: Install dependencies
        run: flutter pub get
        working-directory: acuis

      - name: Build APK
        run: flutter build apk --release
        working-directory: acuis

      - uses: actions/upload-artifact@v4
        with:
          name: android-apk
          path: acuis/build/app/outputs/flutter-apk/app-release.apk

  build-linux:
    name: Linux
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Linux build dependencies
        run: |
          sudo apt-get update -y
          sudo apt-get install -y clang cmake ninja-build libgtk-3-dev

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.41.5'
          channel: stable

      - name: Enable Linux desktop
        run: flutter config --enable-linux-desktop

      - name: Install dependencies
        run: flutter pub get
        working-directory: acuis

      - name: Build Linux
        run: flutter build linux --release
        working-directory: acuis

      - name: Zip Linux build
        run: zip -r acuis-linux.zip acuis/build/linux/x64/release/bundle

      - uses: actions/upload-artifact@v4
        with:
          name: linux-build
          path: acuis-linux.zip

  build-windows:
    name: Windows
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.41.5'
          channel: stable

      - name: Enable Windows desktop
        run: flutter config --enable-windows-desktop

      - name: Install dependencies
        run: flutter pub get
        working-directory: acuis

      - name: Build Windows
        run: flutter build windows --release
        working-directory: acuis

      - name: Zip Windows build
        run: Compress-Archive -Path acuis\build\windows\x64\runner\Release\* -DestinationPath acuis-windows.zip

      - uses: actions/upload-artifact@v4
        with:
          name: windows-build
          path: acuis-windows.zip

  release:
    name: Create GitHub Release
    needs: [build-android, build-linux, build-windows]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          name: android-apk
          path: artifacts/android

      - uses: actions/download-artifact@v4
        with:
          name: linux-build
          path: artifacts/linux

      - uses: actions/download-artifact@v4
        with:
          name: windows-build
          path: artifacts/windows

      - name: Get short SHA
        id: sha
        run: echo "short=$(git rev-parse --short HEAD)" >> $GITHUB_OUTPUT

      - uses: softprops/action-gh-release@v2
        with:
          tag_name: build-${{ steps.sha.outputs.short }}
          name: Build ${{ steps.sha.outputs.short }}
          body: |
            Automated build from commit ${{ github.sha }}

            **Android:** Install `app-release.apk` directly on your device.
            **Linux:** Extract `acuis-linux.zip` and run the `acuis` binary.
            **Windows:** Extract `acuis-windows.zip` and run `acuis.exe`.
          files: |
            artifacts/android/app-release.apk
            artifacts/linux/acuis-linux.zip
            artifacts/windows/acuis-windows.zip
