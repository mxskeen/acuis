name: Build & Release

on:
  push:
    branches:
      - main

jobs:
  build-android:
    name: Android APK
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.41.5'
          channel: stable

      - name: Install dependencies
        run: flutter pub get
        working-directory: acuis

      - name: Build APK
        run: flutter build apk --release
        working-directory: acuis

      - uses: actions/upload-artifact@v4
        with:
          name: android-apk
          path: acuis/build/app/outputs/flutter-apk/app-release.apk

  build-linux:
    name: Linux
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Linux build dependencies
        run: |
          sudo apt-get update -y
          sudo apt-get install -y clang cmake ninja-build libgtk-3-dev \
            dpkg-dev alien fakeroot imagemagick wget

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.41.5'
          channel: stable

      - name: Enable Linux desktop
        run: flutter config --enable-linux-desktop

      - name: Install dependencies
        run: flutter pub get
        working-directory: acuis

      - name: Build Linux
        run: flutter build linux --release
        working-directory: acuis

      # ── .deb ──────────────────────────────────────────────
      - name: Package .deb
        run: |
          BUNDLE=acuis/build/linux/x64/release/bundle
          PKG=pkg-deb/usr/lib/acuis
          mkdir -p $PKG
          cp -r $BUNDLE/* $PKG/
          mkdir -p pkg-deb/usr/bin
          ln -s /usr/lib/acuis/acuis pkg-deb/usr/bin/acuis
          mkdir -p pkg-deb/DEBIAN
          cat > pkg-deb/DEBIAN/control <<EOF
          Package: acuis
          Version: 1.0.0
          Architecture: amd64
          Maintainer: acuis
          Description: Goal tracking app with visual progress feedback
          EOF
          fakeroot dpkg-deb --build pkg-deb acuis.deb

      # ── .rpm (converted from .deb via alien) ──────────────
      - name: Package .rpm
        run: |
          sudo alien --to-rpm --scripts acuis.deb
          mv acuis*.rpm acuis.rpm

      # ── .AppImage ─────────────────────────────────────────
      - name: Package .AppImage
        run: |
          BUNDLE=acuis/build/linux/x64/release/bundle
          APPDIR=AppDir
          mkdir -p $APPDIR/usr/bin $APPDIR/usr/lib/acuis $APPDIR/usr/share/icons/hicolor/256x256/apps
          cp -r $BUNDLE/* $APPDIR/usr/lib/acuis/
          ln -s /usr/lib/acuis/acuis $APPDIR/usr/bin/acuis

          # Icon — convert PNG to 256x256 if present, else create a placeholder
          if [ -f acuis/assets/icon.png ]; then
            convert acuis/assets/icon.png -resize 256x256 $APPDIR/usr/share/icons/hicolor/256x256/apps/acuis.png
            cp $APPDIR/usr/share/icons/hicolor/256x256/apps/acuis.png $APPDIR/acuis.png
          fi

          cat > $APPDIR/acuis.desktop <<EOF
          [Desktop Entry]
          Name=acuis
          Exec=acuis
          Icon=acuis
          Type=Application
          Categories=Utility;
          EOF

          cat > $APPDIR/AppRun <<'APPRUN'
          #!/bin/bash
          HERE="$(dirname "$(readlink -f "$0")")"
          exec "$HERE/usr/lib/acuis/acuis" "$@"
          APPRUN
          chmod +x $APPDIR/AppRun

          wget -q "https://github.com/AppImage/AppImageKit/releases/download/continuous/appimagetool-x86_64.AppImage"
          chmod +x appimagetool-x86_64.AppImage
          ARCH=x86_64 ./appimagetool-x86_64.AppImage $APPDIR acuis.AppImage

      # ── Zip all three together ─────────────────────────────
      - name: Zip Linux packages
        run: zip acuis-linux.zip acuis.deb acuis.rpm acuis.AppImage

      - uses: actions/upload-artifact@v4
        with:
          name: linux-build
          path: acuis-linux.zip

  build-windows:
    name: Windows
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.41.5'
          channel: stable

      - name: Enable Windows desktop
        run: flutter config --enable-windows-desktop

      - name: Install dependencies
        run: flutter pub get
        working-directory: acuis

      - name: Build Windows
        run: flutter build windows --release
        working-directory: acuis

      - name: Zip Windows build
        run: Compress-Archive -Path acuis\build\windows\x64\runner\Release\* -DestinationPath acuis-windows.zip

      - uses: actions/upload-artifact@v4
        with:
          name: windows-build
          path: acuis-windows.zip

  release:
    name: Create GitHub Release
    needs: [build-android, build-linux, build-windows]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          name: android-apk
          path: artifacts/android

      - uses: actions/download-artifact@v4
        with:
          name: linux-build
          path: artifacts/linux

      - uses: actions/download-artifact@v4
        with:
          name: windows-build
          path: artifacts/windows

      - name: Get short SHA
        id: sha
        run: echo "short=$(git rev-parse --short HEAD)" >> $GITHUB_OUTPUT

      - uses: softprops/action-gh-release@v2
        with:
          tag_name: build-${{ steps.sha.outputs.short }}
          name: Build ${{ steps.sha.outputs.short }}
          body: |
            Automated build from commit ${{ github.sha }}

            **Android:** Install `app-release.apk` directly on your device (enable "Install from unknown sources").
            **Linux (Debian/Ubuntu):** `sudo dpkg -i acuis.deb`
            **Linux (Fedora/RHEL):** `sudo rpm -i acuis.rpm`
            **Linux (any distro):** `chmod +x acuis.AppImage && ./acuis.AppImage`
            **Windows:** Extract `acuis-windows.zip` and run `acuis.exe`.
          files: |
            artifacts/android/app-release.apk
            artifacts/linux/acuis-linux.zip
            artifacts/windows/acuis-windows.zip
