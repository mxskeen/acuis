name: Build & Release

on:
  push:
    branches:
      - main

jobs:
  build-android:
    name: Android APK
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Get version number
        id: version
        run: |
          # Use GitHub run number as version code (auto-incrementing)
          echo "build_number=${{ github.run_number }}" >> $GITHUB_OUTPUT

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.41.5'
          channel: stable
          cache: true

      - name: Decode keystore from secrets
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
        run: |
          echo "$KEYSTORE_BASE64" | base64 --decode --ignore-garbage > acuis/android/app/release.keystore

      - name: Create key.properties
        env:
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: |
          cat > acuis/android/key.properties << EOF
          storePassword=$KEYSTORE_PASSWORD
          keyPassword=$KEY_PASSWORD
          keyAlias=$KEY_ALIAS
          storeFile=release.keystore
          EOF

      - name: Install dependencies
        run: flutter pub get
        working-directory: acuis

      - name: Build APK
        env:
          BACKEND_URL: ${{ secrets.BACKEND_URL }}
        run: flutter build apk --release --build-number=${{ steps.version.outputs.build_number }} --dart-define=BACKEND_URL="$BACKEND_URL"
        working-directory: acuis

      - name: Build AAB
        env:
          BACKEND_URL: ${{ secrets.BACKEND_URL }}
        run: flutter build appbundle --release --build-number=${{ steps.version.outputs.build_number }} --dart-define=BACKEND_URL="$BACKEND_URL"
        working-directory: acuis

      - uses: actions/upload-artifact@v4
        with:
          name: android-apk
          path: acuis/build/app/outputs/flutter-apk/app-release.apk

      - uses: actions/upload-artifact@v4
        with:
          name: android-aab
          path: acuis/build/app/outputs/bundle/release/app-release.aab

  build-linux:
    name: Linux
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # Cache apt packages — saves ~2 min on repeat runs
      - name: Cache apt packages
        uses: actions/cache@v4
        with:
          path: /var/cache/apt/archives
          key: apt-linux-build-${{ runner.os }}

      - name: Install Linux build dependencies
        run: |
          sudo apt-get update -y
          sudo apt-get install -y --no-install-recommends \
            clang cmake ninja-build libgtk-3-dev \
            dpkg-dev fakeroot rpm wget

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.41.5'
          channel: stable
          cache: true

      - name: Enable Linux desktop
        run: flutter config --enable-linux-desktop

      - name: Install dependencies
        run: flutter pub get
        working-directory: acuis

      - name: Build Linux
        env:
          BACKEND_URL: ${{ secrets.BACKEND_URL }}
        run: flutter build linux --release --dart-define=BACKEND_URL="$BACKEND_URL"
        working-directory: acuis

      # ── .deb ──────────────────────────────────────────────
      - name: Package .deb
        run: |
          BUNDLE=acuis/build/linux/x64/release/bundle
          PKG=pkg-deb/usr/lib/acuis
          mkdir -p $PKG pkg-deb/usr/bin pkg-deb/DEBIAN
          cp -r $BUNDLE/* $PKG/
          ln -s /usr/lib/acuis/acuis pkg-deb/usr/bin/acuis
          printf 'Package: acuis\nVersion: 1.0.0\nArchitecture: amd64\nMaintainer: acuis\nDescription: Goal tracking app\n' > pkg-deb/DEBIAN/control
          fakeroot dpkg-deb --build pkg-deb acuis.deb

      # ── .rpm (native rpmbuild, fixed) ─────────────────────
      - name: Package .rpm
        run: |
          BUNDLE="$(pwd)/acuis/build/linux/x64/release/bundle"
          mkdir -p ~/rpmbuild/{BUILD,RPMS,SOURCES,SPECS,SRPMS}
          
          # Write the spec file and handle copying inside %install phase
          cat <<EOF > ~/rpmbuild/SPECS/acuis.spec
          Name: acuis
          Version: 1.0.0
          Release: 1
          Summary: Goal tracking app
          License: MIT
          BuildArch: x86_64
          
          %description
          Goal tracking app.
          
          %install
          mkdir -p %{buildroot}/usr/lib/acuis
          mkdir -p %{buildroot}/usr/bin
          cp -r ${BUNDLE}/* %{buildroot}/usr/lib/acuis/
          
          echo '#!/bin/bash' > %{buildroot}/usr/bin/acuis
          echo 'exec /usr/lib/acuis/acuis "\$@"' >> %{buildroot}/usr/bin/acuis
          chmod +x %{buildroot}/usr/bin/acuis
          
          %files
          %defattr(-,root,root,-)
          /usr/lib/acuis
          /usr/bin/acuis
          EOF
          
          # Build the RPM
          rpmbuild -bb --define "_topdir $HOME/rpmbuild" --define "_build_id_links none" ~/rpmbuild/SPECS/acuis.spec
          mv ~/rpmbuild/RPMS/x86_64/acuis-*.rpm acuis.rpm

      # ── .AppImage ─────────────────────────────────────────
      - name: Package .AppImage
        run: |
          BUNDLE=acuis/build/linux/x64/release/bundle
          APPDIR=AppDir
          mkdir -p $APPDIR/usr/bin $APPDIR/usr/lib/acuis $APPDIR/usr/share/icons/hicolor/256x256/apps
          cp -r $BUNDLE/* $APPDIR/usr/lib/acuis/

          if [ -f acuis/assets/icon.png ]; then
            cp acuis/assets/icon.png $APPDIR/acuis.png
            cp acuis/assets/icon.png $APPDIR/usr/share/icons/hicolor/256x256/apps/acuis.png
          fi

          printf '[Desktop Entry]\nName=acuis\nExec=acuis\nIcon=acuis\nType=Application\nCategories=Utility;\n' > $APPDIR/acuis.desktop
          printf '#!/bin/bash\nHERE="$(dirname "$(readlink -f "$0")")"\nexec "$HERE/usr/lib/acuis/acuis" "$@"\n' > $APPDIR/AppRun
          chmod +x $APPDIR/AppRun

          wget -q "https://github.com/AppImage/AppImageKit/releases/download/continuous/appimagetool-x86_64.AppImage"
          chmod +x appimagetool-x86_64.AppImage
          ARCH=x86_64 ./appimagetool-x86_64.AppImage --appimage-extract-and-run $APPDIR acuis.AppImage

      # ── Zip all three ──────────────────────────────────────
      - name: Zip Linux packages
        run: zip acuis-linux.zip acuis.deb acuis.rpm acuis.AppImage

      - uses: actions/upload-artifact@v4
        with:
          name: linux-build
          path: acuis-linux.zip

  build-windows:
    name: Windows
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.41.5'
          channel: stable
          cache: true

      - name: Enable Windows desktop
        run: flutter config --enable-windows-desktop

      - name: Install dependencies
        run: flutter pub get
        working-directory: acuis

      - name: Build Windows
        env:
          BACKEND_URL: ${{ secrets.BACKEND_URL }}
        run: flutter build windows --release --dart-define=BACKEND_URL="$env:BACKEND_URL"
        working-directory: acuis

      - name: Zip Windows build
        run: Compress-Archive -Path acuis\build\windows\x64\runner\Release\* -DestinationPath acuis-windows.zip

      - uses: actions/upload-artifact@v4
        with:
          name: windows-build
          path: acuis-windows.zip

  build-macos:
    name: macOS
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Get version number
        id: version
        run: echo "build_number=${{ github.run_number }}" >> $GITHUB_OUTPUT

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.41.5'
          channel: stable
          cache: true

      - name: Enable macOS desktop
        run: flutter config --enable-macos-desktop

      - name: Install dependencies
        run: flutter pub get
        working-directory: acuis

      - name: Build macOS
        env:
          BACKEND_URL: ${{ secrets.BACKEND_URL }}
        run: flutter build macos --release --build-number=${{ steps.version.outputs.build_number }} --dart-define=BACKEND_URL="$BACKEND_URL"
        working-directory: acuis

      - name: Zip macOS build
        run: |
          cd acuis/build/macos/Build/Products/Release
          zip -r "$OLDPWD/acuis-macos.zip" "acuis.app"

      - uses: actions/upload-artifact@v4
        with:
          name: macos-build
          path: acuis-macos.zip

  build-ios:
    name: iOS (sideload)
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Get version number
        id: version
        run: echo "build_number=${{ github.run_number }}" >> $GITHUB_OUTPUT

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.41.5'
          channel: stable
          cache: true

      - name: Install dependencies
        run: flutter pub get
        working-directory: acuis

      - name: Build iOS (no-codesign for sideloading)
        env:
          BACKEND_URL: ${{ secrets.BACKEND_URL }}
        run: flutter build ios --release --no-codesign --build-number=${{ steps.version.outputs.build_number }} --dart-define=BACKEND_URL="$BACKEND_URL"
        working-directory: acuis

      - name: Create IPA for sideloading
        run: |
          mkdir -p Payload
          cp -r acuis/build/ios/iphoneos/Runner.app Payload/
          zip -r acuis-ios.ipa Payload
          rm -rf Payload

      - uses: actions/upload-artifact@v4
        with:
          name: ios-build
          path: acuis-ios.ipa

  release:
    name: Create GitHub Release
    needs: [build-android, build-linux, build-windows, build-macos, build-ios]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          name: android-apk
          path: artifacts/android

      - uses: actions/download-artifact@v4
        with:
          name: android-aab
          path: artifacts/android

      - uses: actions/download-artifact@v4
        with:
          name: linux-build
          path: artifacts/linux

      - uses: actions/download-artifact@v4
        with:
          name: windows-build
          path: artifacts/windows

      - uses: actions/download-artifact@v4
        with:
          name: macos-build
          path: artifacts/macos

      - uses: actions/download-artifact@v4
        with:
          name: ios-build
          path: artifacts/ios

      - name: Get short SHA
        id: sha
        run: echo "short=$(git rev-parse --short HEAD)" >> $GITHUB_OUTPUT

      - uses: softprops/action-gh-release@v2
        with:
          tag_name: build-${{ steps.sha.outputs.short }}
          name: Build ${{ steps.sha.outputs.short }}
          body: |
            Automated build from commit ${{ github.sha }}

            **Android APK:** Install `app-release.apk` directly (enable "Install from unknown sources").
            **Android AAB:** Upload `app-release.aab` to Google Play Console for Play Store distribution.
            **Linux (Debian/Ubuntu):** `sudo dpkg -i acuis.deb`
            **Linux (Fedora/RHEL):** `sudo rpm -i acuis.rpm`
            **Linux (any distro):** `chmod +x acuis.AppImage && ./acuis.AppImage`
            **Windows:** Extract `acuis-windows.zip` and run `acuis.exe`.
            **macOS:** Extract `acuis-macos.zip` and move `acuis.app` to Applications. You may need to allow it in System Settings > Privacy & Security.
            **iOS:** Sideload `acuis-ios.ipa` using AltStore, Sideloadly, or Apple Configurator.
          files: |
            artifacts/android/app-release.apk
            artifacts/android/app-release.aab
            artifacts/linux/acuis-linux.zip
            artifacts/windows/acuis-windows.zip
            artifacts/macos/acuis-macos.zip
            artifacts/ios/acuis-ios.ipa
